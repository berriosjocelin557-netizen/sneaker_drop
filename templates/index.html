<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sneaker Drop - Tienda Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* Estilos Base y Variables de Diseño */
        body { font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; color: #222; scroll-behavior: smooth; }
        
        /* Menú Superior */
        header { background: #000; color: #fff; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100;}
        header h1 { margin: 0; font-size: 22px; font-weight: 900; letter-spacing: 2px; color: #00ffcc;}
        nav { display: flex; align-items: center; }
        nav a { color: #fff; text-decoration: none; margin-left: 20px; font-weight: 700; text-transform: uppercase; font-size: 12px; transition: color 0.3s;}
        nav a:hover { color: #00ffcc; }

        /* Botón de Carrito en el Menú */
        .btn-carrito-nav { background: #00ffcc; color: #000; padding: 8px 15px; border-radius: 20px; font-weight: 900; border: none; cursor: pointer; margin-left: 20px; display: flex; align-items: center; gap: 5px; font-family: 'Montserrat', sans-serif;}
        .btn-carrito-nav:hover { background: #00ccaa; }

        /* Panel Lateral del Carrito */
        .carrito-sidebar { position: fixed; top: 0; right: -400px; width: 350px; height: 100%; background: #fff; box-shadow: -5px 0 15px rgba(0,0,0,0.3); z-index: 200; transition: 0.3s ease; padding: 30px; display: flex; flex-direction: column; }
        .carrito-sidebar.open { right: 0; }
        .carrito-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .carrito-header h3 { margin: 0; font-weight: 900; text-transform: uppercase; }
        .close-cart { background: none; border: none; font-size: 24px; cursor: pointer; font-weight: 900; }
        .cart-items { flex-grow: 1; overflow-y: auto; margin: 20px 0; padding: 0; list-style: none; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #eee; font-size: 14px; }
        .cart-item-info h4 { margin: 0 0 5px; font-weight: 700; }
        .cart-item-info p { margin: 0; color: #666; }
        .cart-total { font-size: 18px; font-weight: 900; display: flex; justify-content: space-between; border-top: 2px solid #eee; padding-top: 15px; margin-bottom: 20px; }
        .btn-checkout { background: #000; color: #00ffcc; width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: 900; text-transform: uppercase; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-checkout:hover { background: #222; }

        /* Sección de Cuenta Regresiva */
        .hero { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1550399865-ec7d23b18e8e?ixlib=rb-4.0.3') center/cover; color: #fff; text-align: center; padding: 80px 20px;}
        .hero h2 { font-size: 40px; margin: 0; font-weight: 900; color: #00ffcc; text-transform: uppercase;}
        .reloj { font-size: 60px; font-weight: 900; text-shadow: 0 0 15px #00ffcc; margin: 20px 0;}

        /* Producto de Preventa (Conectado a Telegram) */
        .preventa-box { display: flex; max-width: 1000px; margin: -50px auto 50px; background: #fff; border-radius: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); overflow: hidden; position: relative; z-index: 10;}
        .preventa-box img { width: 50%; object-fit: cover;}
        .preventa-info { width: 50%; padding: 40px; display: flex; flex-direction: column; justify-content: center;}
        .preventa-info h3 { font-size: 28px; margin: 0 0 15px; font-weight: 900; text-transform: uppercase;}
        .inventario-badge { background: #ffebee; color: #d32f2f; padding: 10px 15px; border-radius: 8px; font-weight: 900; display: inline-block; margin-bottom: 20px; text-transform: uppercase;}
        .btn-comprar { padding: 15px; font-size: 18px; background: #ff4500; color: #fff; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; font-weight: 900; transition: 0.3s; box-shadow: 0 4px 15px rgba(255,69,0,0.3);}
        .btn-comprar:hover { background: #e03e00; transform: translateY(-2px);}
        .btn-comprar:disabled { background: #ccc; color: #666; cursor: not-allowed; transform: none; box-shadow: none;}

        /* Catálogo e Interactividad de Filtros */
        .catalogo { max-width: 1200px; margin: 60px auto; padding: 0 20px;}
        .catalogo h3 { font-size: 32px; text-align: center; text-transform: uppercase; font-weight: 900; margin-bottom: 30px;}
        .filtros { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; flex-wrap: wrap;}
        select { padding: 12px 20px; font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: 700; border: 2px solid #ddd; border-radius: 8px; cursor: pointer;}
        
        /* Grid de Productos */
        .grid-modelos { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 30px;}
        .modelo-card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; position: relative; display: flex; flex-direction: column;}
        .modelo-card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.1);}
        .modelo-card img { width: 100%; height: 220px; object-fit: cover;}
        
        /* Etiquetas de Descuento Especial */
        .badge-descuento { position: absolute; top: 15px; left: 15px; background: #ff0055; color: #fff; padding: 6px 12px; font-size: 11px; font-weight: 900; border-radius: 6px; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        
        .modelo-info { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between;}
        .badges-container { margin-bottom: 10px; }
        .tag-marca { font-size: 10px; font-weight: 900; background: #eee; padding: 4px 8px; border-radius: 4px; text-transform: uppercase; margin-right: 5px;}
        .tag-genero { font-size: 10px; font-weight: 900; background: #000; color: #fff; padding: 4px 8px; border-radius: 4px; text-transform: uppercase;}
        .modelo-info h4 { margin: 10px 0 5px; font-size: 16px; font-weight: 900;}
        
        /* Estilos de Precio con Descuento */
        .precio-box { margin: 10px 0 15px; font-weight: 700; font-size: 15px;}
        .precio-original { text-decoration: line-through; color: #aaa; margin-right: 8px; font-size: 13px; }
        .precio-actual { color: #ff0055; font-size: 18px; font-weight: 900; }
        .precio-normal { color: #222; font-size: 16px; font-weight: 700; }

        .btn-add-cart { background: #000; color: #fff; border: none; width: 100%; padding: 12px; font-weight: 900; border-radius: 6px; cursor: pointer; text-transform: uppercase; font-size: 12px; transition: 0.2s; font-family: 'Montserrat', sans-serif;}
        .btn-add-cart:hover { background: #00ffcc; color: #000; }

        /* Secciones Informativas */
        .info-section { max-width: 1000px; margin: 0 auto 50px; padding: 40px; background: #fff; border-radius: 12px; text-align: center;}
        .info-section h3 { color: #00ffcc; background: #000; display: inline-block; padding: 10px 20px; border-radius: 8px; text-transform: uppercase; margin-top: 0;}

        @media (max-width: 768px) {
            .preventa-box { flex-direction: column; }
            .preventa-box img, .preventa-info { width: 100%; }
            header { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>
